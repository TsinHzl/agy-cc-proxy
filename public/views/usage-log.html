<div x-data="usageLogViewer" class="view-container h-full flex flex-col">
    <div class="view-card !p-0 flex flex-col flex-1 min-h-0">
        <!-- Toolbar -->
        <div class="bg-space-900 flex flex-wrap gap-y-2 justify-between items-center p-2 px-4 border-b border-space-border select-none min-h-[48px] shrink-0">
            <!-- Left: Decor & Title -->
            <div class="flex items-center gap-3 shrink-0">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/50"></div>
                </div>
                <span class="text-xs font-mono text-gray-500 hidden sm:inline-block">~/usage-log</span>
            </div>

            <!-- Right: Stats & Controls -->
            <div class="flex items-center gap-4 shrink-0">
                <div class="text-[10px] font-mono text-gray-600">
                    <span x-text="$store.global.t('totalRecords', { count: records.length })"></span>
                </div>
                <button class="btn-action-ghost-square" @click="copyAll" :title="$store.global.t('copyAll')" :disabled="records.length === 0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </button>
                <button class="btn-action-ghost-square" @click="refreshData" :title="$store.global.t('refreshData')" :disabled="loading">
                    <svg class="w-4 h-4" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Usage Log Table -->
        <div class="flex-1 overflow-auto bg-space-950 custom-scrollbar">
            <table class="w-full text-[11px] font-mono">
                <thead class="sticky top-0 z-10">
                    <tr class="bg-space-900 text-gray-500 uppercase tracking-wider text-[10px]">
                        <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="$store.global.t('time')">时间</th>
                        <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="$store.global.t('model')">模型</th>
                        <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="$store.global.t('apiKey')">API 密钥</th>
                        <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="$store.global.t('modelUsage')">模型用量</th>
                        <th class="px-3 py-2 text-left font-medium whitespace-nowrap" x-text="$store.global.t('requestLatency')">请求耗时</th>
                        <th class="px-3 py-2 text-right font-medium whitespace-nowrap" x-text="$store.global.t('cost')">消费金额</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-if="records.length === 0 && !loading">
                        <tr>
                            <td colspan="6" class="text-center py-16 text-gray-600 italic">
                                <span x-text="$store.global.t('noUsageRecords')">暂无使用记录</span>
                            </td>
                        </tr>
                    </template>
                    <template x-if="loading && records.length === 0">
                        <tr>
                            <td colspan="6" class="text-center py-16">
                                <span class="loading loading-spinner loading-sm text-neon-purple"></span>
                            </td>
                        </tr>
                    </template>
                    <template x-for="(rec, idx) in records" :key="idx">
                        <tr class="border-b border-space-border/30 hover:bg-white/[0.02] transition-colors group">
                            <!-- Time -->
                            <td class="px-3 py-2 text-gray-400 whitespace-nowrap" x-text="formatTime(rec.timestamp)"></td>

                            <!-- Model -->
                            <td class="px-3 py-2 whitespace-nowrap">
                                <span class="text-neon-purple" x-text="rec.model"></span>
                                <span class="text-gray-600 ml-1" x-show="rec.streaming"
                                    x-text="'(' + $store.global.t('streaming') + ')'"></span>
                            </td>

                            <!-- API Key -->
                            <td class="px-3 py-2">
                                <div class="text-gray-500 text-[10px]" x-text="$store.global.t('defaultKey')">默认密钥</div>
                                <div class="text-gray-300" x-text="rec.apiKey"></div>
                            </td>

                            <!-- Model Usage -->
                            <td class="px-3 py-2">
                                <div class="text-gray-400" x-text="formatTokens('input', rec.inputTokens)"></div>
                                <div class="text-gray-400" x-text="formatTokens('output', rec.outputTokens)"></div>
                                <div class="text-gray-500" x-text="formatTokens('cache', rec.cacheReadTokens)"></div>
                                <div class="text-gray-300 font-bold pt-0.5" x-text="formatTokens('total', rec.totalTokens)"></div>
                            </td>

                            <!-- Latency -->
                            <td class="px-3 py-2 text-gray-400 whitespace-nowrap">
                                <div x-text="formatDuration(rec.totalDuration)"></div>
                                <div class="text-gray-500" x-show="rec.timeToFirstToken != null"
                                    x-text="formatFirstToken(rec.timeToFirstToken)"></div>
                            </td>

                            <!-- Credits -->
                            <td class="px-3 py-2 text-right whitespace-nowrap">
                                <span class="text-neon-green" x-text="formatCredits(rec.credits)"></span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>
